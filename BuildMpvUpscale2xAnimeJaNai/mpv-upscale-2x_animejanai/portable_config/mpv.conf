
# Uses GPU-accelerated video output by default.
vo=gpu-next
# Can cause performance problems with some GPU drivers and GPUs.
profile=high-quality
gpu-api=vulkan,auto
vulkan-queue-count=3

# ===== REMOVE THE ABOVE THREE LINES AND RESAVE IF YOU ENCOUNTER PLAYBACK ISSUES AFTER =====

# Source: https://github.com/hl2guide/better-mpv-config

# External Sources:
# * https://raw.githubusercontent.com/classicjazz/mpv-config/master/mpv.conf

# Enables hardware decoding. Set to "no" to force software decoding.
hwdec=auto-copy-safe

# start fullscreen
#fs

#msg-color=yes # color log messages on terminal
#term-osd-bar=yes # displays a progress bar on the terminal
#cursor-autohide=1000 # autohides the cursor after 1s

hr-seek=yes

# Sets a custom font
osd-font = 'Segoe UI'
osd-font-size=55
osd-scale=0.5

# Saves the seekbar position on exit
save-position-on-quit=yes
watch-later-options=start
reset-on-next-file=pause

# Uses a large seekable RAM cache even for local input.
cache=yes
cache-pause=yes
cache-pause-initial=yes
cache-secs=30
# Uses extra large RAM cache (needs cache=yes to make it useful).
demuxer-max-bytes=768M
demuxer-max-back-bytes=384M
demuxer-cache-wait=no

# Sets the profile restore method to "copy if equal"
profile-restore=copy-equal

# ===== Audio =====

# Sets volume to 100%.
volume=100
volume-max=100

# ===== Subtitles =====
# remove below line to improve subtitle quality if performance is available
blend-subtitles=video

alang = 'jpn'
slang = 'eng'

dither-depth=auto
deband=yes
deband-iterations=2
deband-threshold=48
deband-range=16
deband-grain=48
glsl-shader="~~/shaders/noise_static_luma.hook"
glsl-shader="~~/shaders/noise_static_chroma.hook"

screenshot-format=png
screenshot-directory=~~/screenshots/
screenshot-template='%F__%P__%04n'

# delay repeating commands when holding key down
input-ar-delay=500

# display images indefinitely
image-display-duration = 'inf'

# ===== User overrides =====
# Put your own mpv settings in mpv-user.conf. That file is never overwritten by updates, and its
# options are applied after (and therefore override) the defaults above. Edit mpv-user.conf instead
# of this file so your customizations survive upgrades.
include="~~/mpv-user.conf"

# loop .gif animations
[extension.gif]
loop-file=inf

# loop .webm animations
[extension.webm]
loop-file=inf

# Native inference filter (vf_animejanai): a single profile inserts the
# filter; slots switch at runtime via vf-command (see input.conf) without
# rebuilding the chain. Quality/Balanced/Performance are built-in slots
# 1001/1002/1003; custom slots 1-9 come from animejanai.conf. aji.dll is
# loaded from the mpv.exe directory.
[upscale-off]
vf=""
[upscale-on]
vf=@aji:animejanai:lib=~~/../animejanai/inference/aji.dll:conf=~~/../animejanai/animejanai.conf:model-dir=~~/../animejanai/onnx:rife-model-dir=~~/../animejanai/onnx/rife:trtexec=~~/../animejanai/inference/trtexec.exe:stats=~~/../animejanai/currentanimejanai.log:slot=1002

[default]
profile=upscale-on

