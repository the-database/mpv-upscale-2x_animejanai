# Your mpv settings. Safe to edit - updates never overwrite this file.
#
# AnimeJaNai's managed defaults are pulled in by the include below; anything
# you add AFTER it overrides those defaults (mpv applies later settings last).
# Do not edit mpv-animejanai.conf directly - it is replaced on every update.

include="~~/mpv-animejanai.conf"

# ===== Your settings below =====
# Examples - uncomment to enable:
#fs                     # start fullscreen
#cursor-autohide=1000  # hide the cursor after 1 second of no movement
#blend-subtitles=no    # sharper subtitles (overrides the managed default)
#vo=gpu                # fall back from gpu-next if you hit playback issues
