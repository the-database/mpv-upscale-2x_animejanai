# input-user.conf - your personal keybindings.
#
# Add keybindings here using the same syntax as input.conf: one "KEY  command" per line.
# These are applied on top of the shipped input.conf (so they override the defaults) by
# scripts/animejanai_userinput.lua, and this file is NEVER overwritten by updates - so your
# keybindings survive upgrades. (This is the keybinding counterpart of mpv-user.conf.)
#
# Examples:
#   Ctrl+r  cycle-values video-rotate 90 180 270 0
#   F1      show-text "${path}"
