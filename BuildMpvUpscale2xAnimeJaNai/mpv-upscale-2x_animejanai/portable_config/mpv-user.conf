# mpv-user.conf - your personal mpv settings.
#
# Put any mpv.conf options you want here. This file is INCLUDED by mpv.conf and is applied last, so
# anything you set here overrides the shipped defaults. Updates never overwrite this file, so your
# customizations survive upgrades. (To override a profile, redefine it here or set its options.)
#
# Example:
#   volume=70
#   hwdec=no
